services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  bot:
    profiles: ["bot"]
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/data
    command: python -m app.telegram_bot
    depends_on:
      - app
